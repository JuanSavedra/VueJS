<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <script src="./js/vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <section id="receiver">
        <div class="receive-color cubes" v-bind:class="currentColor">
          <p>
            <strong>Background color: {{ currentColor }}</strong>
          </p>
        </div>
      </section>
      <section>
        <div id="setter">
          <div class="set-color cubes red" v-on:click="setColor('red')"></div>
          <div class="set-color cubes blue" v-on:click="setColor('blue')"></div>
          <div
            class="set-color cubes green"
            v-on:click="setColor('green')"
          ></div>
        </div>
      </section>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
