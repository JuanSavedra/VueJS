<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <h1>Soma de 2 + 2: {{ sum() }}</h1>
    </div>

    <script>
      const vm = new Vue({
        el: "#app",
        data: {
          firstValue: 2,
          secondValue: 2,
        },
        methods: {
          sum: function sum(
            firstValue = this.firstValue,
            secondValue = this.secondValue
          ) {
            //Função convencional
            return firstValue + secondValue;
          },
        },
      });
    </script>
  </body>
</html>
