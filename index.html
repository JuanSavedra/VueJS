<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <script src="./js/vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <section>
        <div
          v-bind:class="box1Color == 'red' ? classColors[0] : classColors[1]"
        >
          Caixa 1
        </div>
        <div
          v-bind:class="box2Color == 'red' ? classColors[0] : classColors[1]"
        >
          Caixa 2
        </div>
        <form>
          <label for="Input">
            Expressões dentro do input
            <input v-bind:value="5 + 5" type="number" id="Input" />
          </label>
        </form>
      </section>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
