<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <form>
        <label for="Email">
          Email
          <input id="Email" type="text" v-bind:placeholder="placeholderEmail" />
        </label>
        <label for="Password">
          Senha
          <input
            id="Password"
            type="password"
            v-bind:placeholder="placeholderPassword"
          />
        </label>
        <div>
          <a v-bind:href="link">Esqueceu a senha?</a>
        </div>
      </form>
    </div>

    <script>
      const vm = new Vue({
        el: "#app",
        data: {
          placeholderEmail: "Digite seu email",
          placeholderPassword: "Digite sua senha",
          link: "#",
        },
        methods: {},
      });
    </script>
  </body>
</html>
