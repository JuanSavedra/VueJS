<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <h1>Soma de 2 + 2: {{ sum(2, 2) }}</h1>
      <h1>Subtração de 2 - 2: {{ subtract(2, 2) }}</h1>
      <h1>Multiplicação de 2 * 2: {{ multiply(2, 2) }}</h1>
      <h1>Divisão de 2 / 2: {{ division(2, 2) }}</h1>
    </div>

    <script>
      const vm = new Vue({
        el: "#app",
        data: {},
        methods: {
          sum: function sum(firstValue, secondValue) {
            //Função convencional
            return firstValue + secondValue;
          },
          subtract: function (firstValue, secondValue) {
            //Função anônima
            return firstValue - secondValue;
          },
          multiply: (firstValue, secondValue) => {
            //Função de setas (Arrow Function)
            return firstValue * secondValue;
          },
          division(firstValue, secondValue) {
            //Método
            return firstValue / secondValue;
          },
        },
      });
    </script>
  </body>
</html>
