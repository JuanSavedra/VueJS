<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <h1>{{ message }}</h1>
      <p>ID: {{ id }}</p>
      <p>Email: {{ email }}</p>
      <p>Senha: {{ password }}</p>
      <p>Trabalha como: {{ jobs[0] }} e {{ jobs[1] }}</p>
      <p>Salário: {{ salary }}</p>
      <p>Mãe: Nome: {{ parents[0].name }} | Email: {{parents[0].email}}</p>
      <p>Pai: Nome: {{ parents[1].name }} | Email: {{parents[1].email}}</p>
    </div>

    <script>
      const vm = new Vue({
        el: "#app",
        data: {
          message: "Dados do Robson",
          id: "167b5a-5d5aw14-4dwa5d",
          email: "robson@gmail.com",
          password: "21343819",
          salary: 4599.99,
          jobs: ["Programador", "Designer"],
          parents: [
            { name: "Julia", email: "julia@gmail.com" },
            { name: "Patrick", email: "patrick@gmail.com" },
          ],
        },
      });
    </script>
  </body>
</html>
