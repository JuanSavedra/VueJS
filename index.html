<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">{{ message }}</div>

    <script>
      //Forma mais utilizada:
      const vm = new Vue({
        el: "#app",
        data: {
          message: "Elemento controlado pelo VueJS",
        },
      });

      //Forma menos utilizada:
      /*
      options = {
        el: "#app", //el = Element
        data: {
          message: "Elemento controlado pelo VueJS",
        },
      };

      const vm = new Vue(options); //vm = ViewModel
      */
    </script>
  </body>
</html>
