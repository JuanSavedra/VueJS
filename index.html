<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <script src="./js/vue.js"></script>
    <title>VueJS</title>
  </head>
  <body>
    <div id="app">
      <section>
        <!-- Encadeamento de classes -->
        <p class="paragraph" v-bind:class="classBold">
          <!-- Sobreposição do link pelo github -->
          <a v-bind:href="link" href="https://github.com/JuanSavedra">
            Link para o meu github
          </a>
        </p>
        <!-- Encadeamento de classes -->
        <p v-bind:class="classBold" class="paragraph">
          <!-- Sobreposição do github pelo link -->
          <a href="https://github.com/JuanSavedra" v-bind:href="link">
            Link para o github em si
          </a>
        </p>
      </section>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
